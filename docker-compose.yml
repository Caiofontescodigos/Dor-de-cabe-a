version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: domino-server
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
    volumes:
      - ./packages/server/src:/app/src
    networks:
      - domino-network
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    container_name: domino-client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3001
    volumes:
      - ./packages/client/src:/app/src
    networks:
      - domino-network
    depends_on:
      - server
    restart: unless-stopped

networks:
  domino-network:
    driver: bridge
